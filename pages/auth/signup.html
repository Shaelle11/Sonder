<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign Up — Sonder</title>
  <link rel="stylesheet" href="../../styles/base.css" />
  <link rel="stylesheet" href="../../styles/auth.css" />
</head>

<body data-page="signup" class="auth-page">
  <div id="background-layer" aria-hidden="true"></div>
  <div id="rain-glass-layer" aria-hidden="true"></div>

  <header>
    <a href="../../index.html" class="logo">Sonder</a>
  </header>

  <main class="auth-container">
    <h1>Create an account</h1>

   <form class="auth-form" id="signupForm" novalidate>
    <fieldset class="form-row">
        <label for="su-name">Full name</label>
        <input id="su-name" name="name" type="text" />
        <p class="form-error" id="su-name-error" aria-live="polite"></p>
    </fieldset>

    <fieldset class="form-row">
        <label for="su-email">Email</label>
        <input id="su-email" name="email" type="text" />
        <p class="form-error" id="su-email-error" aria-live="polite"></p>
    </fieldset>

    <fieldset class="form-row">
        <label for="su-password">Password</label>
        <input id="su-password" name="password" type="password" />
        <p class="form-error" id="su-password-error" aria-live="polite"></p>
    </fieldset>

    <button class="cta" type="submit">Create account</button>

    <p class="muted">
        Already have an account? <a href="signin.html">Sign in</a>
    </p>

    <a class="guest-link" href="../timeCapsule.html">Continue as guest</a>
</form>
  </main>

  <script src="../../scripts/auth.js"></script>
  <script src="../../scripts/theme.js"></script>
</body>
</html>
