<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Sonder</title>
  <link rel="stylesheet" href="../../styles/base.css" />
  <link rel="stylesheet" href="../../styles/auth.css" />
</head>

<body data-page="signin">
  <div id="background-layer" aria-hidden="true"></div>
  <div id="rain-glass-layer" aria-hidden="true"></div>

  <header>
    <a href="../../index.html" class="logo">Sonder</a>
  </header>

  <main class="auth-container">
    <h1>Sign in</h1>

    <form class="auth-form" id="signinForm" novalidate>
    <fieldset class="form-row">
        <label for="si-email">Email</label>
        <input id="si-email" name="email" type="text" />
        <p class="form-error" id="si-email-error" aria-live="polite"></p>
    </fieldset>

    <fieldset class="form-row">
        <label for="si-password">Password</label>
        <input id="si-password" name="password" type="password" />
        <p class="form-error" id="si-password-error" aria-live="polite"></p>
    </fieldset>

    <button class="cta" type="submit">Sign in</button>

    <p class="muted">
        New here? <a href="signup.html">Create an account</a>
    </p>

    <a class="guest-link" href="../timeCapsule.html">Continue as guest</a>
</form>
  </main>

  <script src="../../scripts/auth.js"></script>
  <script src="../../scripts/theme.js"></script>
</body>
</html>
